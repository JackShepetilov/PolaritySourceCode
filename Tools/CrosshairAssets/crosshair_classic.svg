<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <!-- Classic AAA crosshair: four outlined ticks, no center dot, no ring.
       White core is tintable; the dark outline gives readability on any background. -->

  <!-- tick outlines (dark halo) -->
  <rect x="75" y="22"  width="10" height="38" rx="5" fill="#05070A" fill-opacity="0.6"/>
  <rect x="75" y="100" width="10" height="38" rx="5" fill="#05070A" fill-opacity="0.6"/>
  <rect x="22" y="75"  width="38" height="10" rx="5" fill="#05070A" fill-opacity="0.6"/>
  <rect x="100" y="75" width="38" height="10" rx="5" fill="#05070A" fill-opacity="0.6"/>

  <!-- tick cores (white) -->
  <rect x="77" y="24"  width="6" height="34" rx="3" fill="#FFFFFF"/>
  <rect x="77" y="102" width="6" height="34" rx="3" fill="#FFFFFF"/>
  <rect x="24" y="77"  width="34" height="6" rx="3" fill="#FFFFFF"/>
  <rect x="102" y="77" width="34" height="6" rx="3" fill="#FFFFFF"/>
</svg>
