<text x="60" y="1296" font-size="11" fill="#666666">Бюджеты: вэлвы 5–15 тыс. uu пути; зазор полей-стаканов ≥ 2–3 тыс.; шаг слотов склона ≥ 10.5 тыс. (см. отчёт render_island_layout.py)</text>
